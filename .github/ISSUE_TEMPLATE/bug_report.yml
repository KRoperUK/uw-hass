name: Bug report
description: Report a problem with the UW Home Assistant integration.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
  - type: input
    id: version
    attributes:
      label: Integration version
      description: Which version of the Utility Warehouse integration are you running?
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Which version of Home Assistant are you running?
      placeholder: e.g. 2025.7.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else reproduce the problem?
      placeholder: |
        1. Go to Settings → Devices & Services
        2. Add Utility Warehouse integration
        3. Enter credentials
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Debug logs
      description: |
        Relevant logs with debug logging enabled for `custom_components.utility_warehouse` and `uw_api`.
        **Redact your email, password, and any tokens before posting.**
      render: text
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
    validations:
      required: false
