name: Release Please

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: release-please
    cancel-in-progress: false

jobs:
    release-please:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
              with:
                  token: ${{ github.token }}
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            - name: Checkout code for zip packaging
              if: ${{ steps.release.outputs.release_created == 'true' }}
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Upload HACS zip asset
              if: ${{ steps.release.outputs.release_created == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.release.outputs.tag_name }}
              run: |
                  bash scripts/package-hacs-zip.sh uw.zip
                  gh release upload "$TAG" uw.zip --clobber

            - name: Verify HACS zip asset is attached
              if: ${{ steps.release.outputs.release_created == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.release.outputs.tag_name }}
              run: |
                  set -euo pipefail
                  assets=$(gh release view "$TAG" --json assets --jq '.assets[].name')
                  echo "Assets on ${TAG}:"
                  printf '%s\n' "$assets"
                  if ! printf '%s\n' "$assets" | grep -Fxq "uw.zip"; then
                    echo "::error::Release ${TAG} is missing the uw.zip asset"
                    exit 1
                  fi
                  echo "Verified uw.zip is attached to ${TAG}."

            - name: Prune all dev pre-releases on a real release
              if: ${{ steps.release.outputs.release_created == 'true' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  echo "Release created; deleting all dev pre-releases (rc / pr / legacy dev-*)."
                  gh release list --limit 1000 --json tagName,isPrerelease \
                    --jq '.[] | select(.isPrerelease) | .tagName' \
                  | while read -r tag; do
                      case "$tag" in
                        dev-*) ;;
                        v[0-9]*.[0-9]*.[0-9]*-rc.*|v[0-9]*.[0-9]*.[0-9]*-pr.*) ;;
                        *) continue ;;
                      esac
                      echo "Deleting ${tag}"
                      gh release delete "$tag" --yes --cleanup-tag
                    done
