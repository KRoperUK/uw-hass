name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      component: ${{ steps.filter.outputs.component }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            component:
              - 'custom_components/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'requirements_test.txt'
              - 'hacs.json'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install ruff
        run: pip install "$(grep -E '^ruff==' requirements_test.txt)"

      - name: Lint with ruff
        run: ruff check --output-format=github custom_components/ tests/

      - name: Check formatting
        run: ruff format --check custom_components/ tests/

  test:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Type check with mypy
        run: |
          set -o pipefail
          mypy | sed -E \
            -e 's/^([^:]+):([0-9]+): error: (.*)$/::error file=\1,line=\2::\3/' \
            -e 's/^([^:]+):([0-9]+): note: (.*)$/::notice file=\1,line=\2::\3/'

      - name: Run tests with coverage
        run: >-
          pytest tests/
          --cov=custom_components/utility_warehouse --cov-branch
          --cov-report=xml --cov-report=term-missing
          --junitxml=junit.xml -o junit_family=legacy
          -n auto --dist=loadscope
          -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: junit.xml

  hacs_validate:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  scripts:
    needs: changes
    if: needs.changes.outputs.component == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Syntax-check shell scripts
        run: |
          shopt -s nullglob
          status=0
          for f in scripts/*.sh; do
            if bash -n "$f"; then
              echo "ok: $f"
            else
              echo "::error file=$f::bash -n found a syntax error"
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "One or more shell scripts failed syntax checking." >&2
          fi
          exit "$status"
