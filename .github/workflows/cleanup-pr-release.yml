name: Cleanup PR dev releases

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete pre-releases for this PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH_RAW: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH=$(printf '%s' "$BRANCH_RAW" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-\{2,\}/-/g')
          echo "Deleting PR pre-releases for PR #${PR_NUMBER} (branch ${BRANCH})"

          gh release list --limit 1000 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName' \
          | while read -r tag; do
              delete=false
              if printf '%s' "$tag" | grep -Eq "^v[0-9]+\\.[0-9]+\\.[0-9]+-pr\\.${PR_NUMBER}\\."; then
                delete=true
              elif printf '%s' "$tag" | grep -Eq "^dev-v[0-9]+\\.[0-9]+\\.[0-9]+-${BRANCH}-[0-9]+$"; then
                delete=true
              fi
              if [ "$delete" = true ]; then
                echo "Deleting release and tag: ${tag}"
                gh release delete "$tag" --yes --cleanup-tag
              fi
            done
